<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | الاستبيان</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-main questionnaire-screen" onload="loadQuestionnairePage()">
  <div class="bg-blur bg-blur-top"></div>
  <div class="bg-blur bg-blur-bottom"></div>

  <header class="q-top-header">
    <button class="q-back-btn" onclick="handleQuestionnaireBack()" aria-label="رجوع">
      ←
    </button>

    <img src="logo.png" alt="شعار مدد" class="q-header-logo" />
  </header>

  <main class="q-flow-wrap">
    <h1 class="q-main-title">استبيان الفحص المبكر لاضطراب طيف التوحد</h1>

    <p class="q-progress" id="questionProgress">السؤال: 1/12</p>

    <section class="q-card">
      <h2 class="q-question-title" id="questionTitle">...</h2>
      <p class="q-question-desc" id="questionDescription"></p>

      <div class="q-options" id="questionOptions"></div>

      <p id="questionnaireError" class="form-error q-error"></p>

      <div class="q-actions">
        <button class="q-next-btn" id="nextQuestionBtn" onclick="nextQuestionStep()">
          التالي
        </button>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
