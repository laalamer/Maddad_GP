<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>مدد | الاستبيان</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="questionnaire-page-body" onload="loadQuestionnairePage()">

  <div class="questionnaire-page">

    <header class="questionnaire-header">
      <button class="questionnaire-back" onclick="resetQuestionnaireAndGoHome()">←</button>
      <img src="logo.png" alt="شعار مدد" class="questionnaire-logo" />
    </header>

    <main class="questionnaire-main">
      <h1 class="questionnaire-main-title">استبيان الفحص المبكر لاضطراب طيف التوحد</h1>

      <div class="questionnaire-progress" id="questionProgress">السؤال: 1/10</div>

      <div class="questionnaire-card">
        <h2 class="questionnaire-question" id="questionTitle"></h2>
        <p class="questionnaire-description" id="questionDescription"></p>

        <div class="questionnaire-options" id="questionOptions"></div>

        <p id="questionnaireError" class="questionnaire-error"></p>

        <div class="questionnaire-nav" id="questionNav"></div>
      </div>
    </main>

  </div>

  <script src="script.js"></script>
</body>
</html>
