<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>حسابي</title>
  <link rel="stylesheet" href="style.css" />

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f6f7fb;
      font-family: "Segoe UI", Tahoma, sans-serif;
    }

    .account-page {
      max-width: 950px;
      margin: auto;
      padding: 50px 20px 70px;
      text-align: center;
    }

    .account-title {
      font-size: 42px;
      font-weight: 800;
      color: #222;
      margin-bottom: 18px;
    }

    .account-icon {
      width: 95px;
      height: 95px;
      margin: 0 auto 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #eef1ff, #e4e8ff);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 20px rgba(91, 91, 214, 0.12);
      font-size: 44px;
      color: #5b5bd6;
    }

    .cards-row {
      display: flex;
      justify-content: center;
      gap: 28px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .card {
      background: #ffffff;
      width: 320px;
      min-height: 180px;
      padding: 28px 24px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.07);
      text-align: center;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
      box-sizing: border-box;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.1);
    }

    .card h3 {
      margin: 0 0 16px;
      font-size: 22px;
      color: #222;
      font-weight: 800;
    }

    .card p {
      margin: 8px 0;
      font-size: 18px;
      color: #444;
      line-height: 1.8;
    }

    .progress-card {
      background: #ffffff;
      width: 360px;
      min-height: 150px;
      margin: 10px auto 42px;
      padding: 28px 24px;
      border-radius: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.07);
      text-align: center;
      box-sizing: border-box;
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    .progress-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 16px 34px rgba(0, 0, 0, 0.1);
    }

    .progress-card h3 {
      margin: 0 0 16px;
      font-size: 24px;
      color: #222;
      font-weight: 800;
    }

    .progress-card p {
      margin: 8px 0;
      font-size: 18px;
      color: #444;
      line-height: 1.8;
    }

    .account-buttons {
      display: flex;
      justify-content: center;
      gap: 18px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    .btn {
      display: inline-block;
      min-width: 170px;
      padding: 14px 26px;
      border-radius: 999px;
      text-decoration: none;
      color: #fff;
      font-size: 17px;
      font-weight: 700;
      background: linear-gradient(135deg, #5b5bd6, #6f7cff);
      box-shadow: 0 8px 18px rgba(91, 91, 214, 0.22);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .btn:hover {
      transform: scale(1.04);
      box-shadow: 0 12px 24px rgba(91, 91, 214, 0.28);
    }

    .btn.secondary {
      background: linear-gradient(135deg, #6f7cff, #8a6df1);
    }

    .btn.logout {
      background: linear-gradient(135deg, #7a7a95, #5f6178);
      box-shadow: 0 8px 18px rgba(95, 97, 120, 0.22);
    }

    @media (max-width: 768px) {
      .account-title {
        font-size: 34px;
      }

      .card,
      .progress-card {
        width: 100%;
        max-width: 360px;
      }

      .btn {
        min-width: 150px;
        font-size: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="account-page">
    <div class="account-title">حسابي</div>

    <div class="account-icon">👤</div>

    <div class="cards-row">
      <div class="card">
        <h3>المعلومات الشخصية</h3>
        <p>الاسم: مدى</p>
        <p>العمر: 30 شهر</p>
        <p>تاريخ الانضمام: 2026 / 3 / 2</p>
      </div>

      <div class="card">
        <h3>معلومات التقييم</h3>
        <p>مستوى التقييم: متوسط</p>
        <p>آخر تقييم: 2026 / 2 / 22</p>
      </div>
    </div>

    <div class="progress-card">
      <h3>التقدم</h3>
      <p>الجلسات المكتملة: 3</p>
      <p>المهارات المستهدفة: التواصل البصري</p>
    </div>

    <div class="account-buttons">
      <a href="home.html" class="btn secondary">العودة للرئيسية</a>
      <a href="#" class="btn">تعديل المعلومات</a>
      <a href="index.html" class="btn logout">تسجيل الخروج</a>
    </div>
  </div>
</body>
</html>
